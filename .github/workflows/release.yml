name: Create Release

on:
  push:
    tags:
      - 'v*'  

permissions:
  contents: write  

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
 steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - name: Build project
        run: |
          
          mkdir -p build
          cd build
          cmake ..
          make
          make package
          ls -la *.tar.gz
    - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            
          files: |
            build/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
